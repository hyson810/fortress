<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydra Pro — Network Defense Platform</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="topbar">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 40 40" width="32" height="32">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ff88"/>
            <stop offset="100%" stop-color="#00ccff"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <path d="M20 34 Q16 26 12 18 Q8 10 20 6 Q32 10 28 18 Q24 26 20 34Z"
              stroke="url(#lg)" fill="none" stroke-width="2.5" filter="url(#glow)"/>
        <circle cx="20" cy="10" r="3" fill="#00ff88" filter="url(#glow)"/>
        <circle cx="14" cy="16" r="2.2" fill="#00eeaa" filter="url(#glow)"/>
        <circle cx="26" cy="16" r="2.2" fill="#00eeaa" filter="url(#glow)"/>
        <circle cx="12" cy="24" r="2" fill="#00ddcc" filter="url(#glow)"/>
        <circle cx="28" cy="24" r="2" fill="#00ddcc" filter="url(#glow)"/>
      </svg>
      <span class="logo-text">Hydra Pro</span>
      <span class="logo-sub">Network Defense Platform</span>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="/" class="nav-link active" data-route="/">Overview</a>
      <a href="/threats" class="nav-link" data-route="/threats">Threats</a>
      <a href="/timeline" class="nav-link" data-route="/timeline">Timeline</a>
      <a href="/correlation" class="nav-link" data-route="/correlation">Correlation</a>
      <a href="/topology" class="nav-link" data-route="/topology">Topology</a>
      <a href="/heatmap" class="nav-link" data-route="/heatmap">Heatmap</a>
      <a href="/evidence" class="nav-link" data-route="/evidence">Evidence</a>
    </div>
    <div class="status-badge" id="status-badge">
      <span class="status-dot"></span> Running
    </div>
  </nav>
  <main id="main-content">
    <div class="loading">Loading...</div>
  </main>
  <script src="/js/app.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/topology.js"></script>
  <script src="/js/timeline.js"></script>
</body>
</html>
