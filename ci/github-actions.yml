# Fortress CI Pipeline
# Triggers: push to main, pull requests
# Jobs: go-test (3 OS), rust-test, semgrep scan, BPF compile check

name: Fortress CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22'
  RUST_VERSION: '1.78'

jobs:
  # ── Go test suite ──────────────────────────────────────────
  go-test:
    name: Go ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: go vet
        run: |
          cd dagger/teamserver  && go vet ./...
          cd dagger/builder    && go vet ./...
          cd dagger/shared     && go vet ./...

      - name: go test
        run: go test -race -count=1 -timeout 300s ./dagger/...

      - name: go test (fortress core)
        run: go test -count=1 -timeout 120s ./internal/...

  # ── Rust test + clippy ─────────────────────────────────────
  rust-test:
    name: Rust ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: '${{ env.RUST_VERSION }}', target: '${{ matrix.target }}' }

      - name: cargo clippy
        run: cargo clippy --manifest-path dagger/implant/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path dagger/implant/Cargo.toml

      - name: cargo test (muscle)
        run: cargo test --manifest-path muscle/Cargo.toml

  # ── Semgrep security scan ──────────────────────────────────
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: semgrep scan
        run: |
          semgrep --config .semgrep/go-security.yml --error dagger/ shield/
          semgrep --config .semgrep/rust-security.yml --error dagger/implant/src/ muscle/
          semgrep --config .semgrep/c-security.yml --error shield/ebpf/ kernel/

  # ── BPF compile check ──────────────────────────────────────
  bpf-check:
    name: BPF Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install BPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm libbpf-dev

      - name: compile BPF programs
        run: |
          for f in shield/ebpf/*.bpf.c kernel/bpf/*.c; do
            [ -f "$f" ] || continue
            echo "::group::Compiling $f"
            clang -O2 -g -target bpf -D__TARGET_ARCH_x86 \
              -I/usr/include/x86_64-linux-gnu \
              -c "$f" -o "${f%.c}.o" \
              -Wall -Werror
            echo "::endgroup::"
          done

  # ── Artifact upload ────────────────────────────────────────
  artifacts:
    name: Artifacts
    needs: [go-test, rust-test, semgrep, bpf-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }

      - name: build
        run: make all 2>/dev/null || (cd dagger/teamserver && go build -o ../../fortress .)

      - uses: actions/upload-artifact@v4
        with:
          name: fortress-linux-amd64
          path: fortress
